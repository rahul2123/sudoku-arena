<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sudoku Arena · Theme Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  body {
    font-family: var(--font);
    background: #0a0a12;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .wrap { max-width: 1280px; margin: 0 auto; }
  .head { text-align: center; margin-bottom: 36px; }
  .head h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg,#a78bfa,#22d3ee,#f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .head p { color: #9a9ab0; margin-top: 8px; font-size: 15px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 28px;
  }
  .theme-card {
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .25s ease, box-shadow .25s ease;
    position: relative;
    border: 2px solid transparent;
  }
  .theme-card:hover { transform: translateY(-6px); }
  .theme-card.selected { border-color: #22d3ee; box-shadow: 0 0 0 4px #22d3ee33; }
  .stage { padding: 26px; min-height: 420px; display: flex; flex-direction: column; gap: 16px; }

  /* shared mini board */
  .board { display: grid; grid-template-columns: repeat(9,1fr); gap: 2px; width: 100%; max-width: 320px; margin: 0 auto; border-radius: 8px; overflow: hidden; }
  .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: clamp(11px,2.2vw,15px); font-weight: 600; }
  .hud { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .chip { font-size: 11px; padding: 5px 10px; border-radius: 20px; font-weight: 600; }
  .label { text-align: center; }
  .label h3 { font-size: 20px; font-weight: 800; }
  .label span { font-size: 13px; display:block; margin-top: 4px; }
  .badge {
    position: absolute; top: 14px; right: 14px;
    background: #22d3ee; color: #04121a; font-size: 11px; font-weight: 800;
    padding: 5px 12px; border-radius: 20px; opacity: 0; transition: opacity .2s;
    z-index: 5;
  }
  .theme-card.selected .badge { opacity: 1; }

  .picker { text-align:center; margin-top: 40px; }
  .picker .chosen {
    display: inline-block; padding: 14px 26px; border-radius: 14px;
    background: linear-gradient(90deg,#a78bfa,#22d3ee); color: #04121a; font-weight: 800; font-size: 16px;
  }
  .picker .chosen.none { background: #2a2a3a; color: #9a9ab0; }

  /* ============ THEME 1: AURORA GLASS ============ */
  .t-aurora {
    background:
      radial-gradient(circle at 20% 20%, rgba(167,139,250,.55), transparent 40%),
      radial-gradient(circle at 80% 0%, rgba(34,211,238,.45), transparent 40%),
      radial-gradient(circle at 60% 90%, rgba(244,114,182,.45), transparent 45%),
      linear-gradient(135deg,#1e1b4b,#0f172a);
  }
  .t-aurora .panel { background: rgba(255,255,255,.08); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.15); border-radius: 16px; padding: 14px; }
  .t-aurora .board { background: rgba(255,255,255,.06); }
  .t-aurora .cell { background: rgba(255,255,255,.07); color: #e9d5ff; }
  .t-aurora .cell.given { color: #fff; }
  .t-aurora .cell.hi { background: rgba(34,211,238,.28); color: #67e8f9; box-shadow: inset 0 0 0 1px rgba(34,211,238,.6); }
  .t-aurora .cell.err { color: #fb7185; }
  .t-aurora .cell.br { box-shadow: inset 0 -2px 0 rgba(255,255,255,.25); }
  .t-aurora .cell.rb { box-shadow: inset -2px 0 0 rgba(255,255,255,.25); }
  .t-aurora .chip { background: rgba(255,255,255,.12); color: #e9d5ff; border:1px solid rgba(255,255,255,.18); }
  .t-aurora .label h3 { color: #fff; }
  .t-aurora .label span { color: #c4b5fd; }

  /* ============ THEME 2: MIDNIGHT GALAXY ============ */
  .t-galaxy {
    background: radial-gradient(ellipse at 50% 30%, #1b1140 0%, #07030f 70%);
    position: relative; overflow: hidden;
  }
  .t-galaxy::before {
    content:""; position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 60% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, #fff, transparent),
      radial-gradient(1px 1px at 30% 80%, #fff, transparent),
      radial-gradient(1px 1px at 90% 60%, #a78bfa, transparent),
      radial-gradient(1.5px 1.5px at 45% 45%, #22d3ee, transparent),
      radial-gradient(1px 1px at 10% 60%, #fff, transparent),
      radial-gradient(1px 1px at 70% 90%, #fff, transparent);
    background-size: 100% 100%;
    opacity:.8;
  }
  .t-galaxy .panel { position: relative; background: rgba(20,12,40,.55); border:1px solid rgba(167,139,250,.3); border-radius: 16px; padding: 14px; box-shadow: 0 0 30px rgba(124,58,237,.25); }
  .t-galaxy .board { background: rgba(124,58,237,.15); }
  .t-galaxy .cell { background: rgba(15,10,30,.7); color: #c4b5fd; }
  .t-galaxy .cell.given { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,.5); }
  .t-galaxy .cell.hi { background: rgba(34,211,238,.3); color: #67e8f9; box-shadow: 0 0 12px rgba(34,211,238,.7); }
  .t-galaxy .cell.br { box-shadow: inset 0 0 0 1px rgba(167,139,250,.4); }
  .t-galaxy .chip { background: rgba(124,58,237,.25); color: #ddd6fe; border:1px solid rgba(167,139,250,.35); }
  .t-galaxy .label h3 { color: #fff; text-shadow: 0 0 14px rgba(167,139,250,.8); }
  .t-galaxy .label span { color: #a78bfa; }

  /* ============ THEME 3: NEO-BRUTALIST ============ */
  .t-brut {
    background: #fef9c3;
  }
  .t-brut .panel { background: #fff; border: 3px solid #000; border-radius: 14px; padding: 12px; box-shadow: 8px 8px 0 #000; }
  .t-brut .board { background: #000; gap: 3px; border: 3px solid #000; border-radius: 8px; }
  .t-brut .cell { background: #fff; color: #000; font-weight: 800; }
  .t-brut .cell.given { color: #000; }
  .t-brut .cell.hi { background: #a3e635; }
  .t-brut .cell.err { background: #f472b6; color:#000; }
  .t-brut .cell.br { box-shadow: inset 0 -3px 0 #000; }
  .t-brut .cell.rb { box-shadow: inset -3px 0 0 #000; }
  .t-brut .chip { background: #fde047; color:#000; border:2px solid #000; box-shadow: 3px 3px 0 #000; font-weight:800; }
  .t-brut .label h3 { color: #000; text-shadow: 3px 3px 0 #f472b6; }
  .t-brut .label span { color: #000; background:#a3e635; display:inline-block; padding:2px 8px; }

  /* ============ THEME 4: ZEN NATURE ============ */
  .t-zen {
    background: linear-gradient(160deg,#5a7a5a 0%,#3d5a3d 40%,#2d3f2a 100%);
  }
  .t-zen .panel { background: rgba(245,240,225,.95); border-radius: 18px; padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
  .t-zen .board { background: #5a7a5a; gap:1px; }
  .t-zen .cell { background: #faf6ec; color: #3d3220; font-weight: 600; }
  .t-zen .cell.given { color: #2d3f2a; }
  .t-zen .cell.hi { background: #d9e8c9; color:#3d5a3d; }
  .t-zen .cell.br { box-shadow: inset 0 -2px 0 #5a7a5a; }
  .t-zen .cell.rb { box-shadow: inset -2px 0 0 #5a7a5a; }
  .t-zen .chip { background: #d9e8c9; color:#3d5a3d; border-radius: 20px; }
  .t-zen .label h3 { color: #faf6ec; font-family: Georgia, serif; }
  .t-zen .label span { color: #d9e8c9; font-family: Georgia, serif; }

  /* ============ THEME 5: SUNSET GRADIENT ============ */
  .t-sunset {
    background: linear-gradient(135deg,#fb7185 0%,#f97316 40%,#facc15 100%);
  }
  .t-sunset .panel { background: rgba(255,255,255,.92); border-radius: 20px; padding: 14px; box-shadow: 0 12px 32px rgba(190,24,93,.35); }
  .t-sunset .board { background: #fda4af; gap:1px; }
  .t-sunset .cell { background: #fff; color: #831843; font-weight: 700; }
  .t-sunset .cell.given { color: #831843; }
  .t-sunset .cell.hi { background: #fef3c7; color:#b45309; }
  .t-sunset .cell.br { box-shadow: inset 0 -2px 0 #f9a8d4; }
  .t-sunset .cell.rb { box-shadow: inset -2px 0 0 #f9a8d4; }
  .t-sunset .chip { background: #fff; color:#db2777; box-shadow: 0 2px 8px rgba(190,24,93,.2); }
  .t-sunset .label h3 { color: #fff; text-shadow: 0 2px 12px rgba(190,24,93,.5); }
  .t-sunset .label span { color: #fff7ed; }

  /* ============ THEME 6: PAPER ORIGAMI ============ */
  .t-paper {
    background: #ece9e2;
  }
  .t-paper .panel { background: #fff; border-radius: 6px; padding: 14px; box-shadow: 0 2px 0 #d8d3c8, 0 4px 0 #c9c3b6, 0 8px 16px rgba(0,0,0,.08); border-left: 4px solid #4f46e5; }
  .t-paper .board { background: #d8d3c8; gap:1px; border-radius: 4px; overflow:hidden; }
  .t-paper .cell { background: #fff; color: #1f2937; font-weight: 600; }
  .t-paper .cell.given { color: #1f2937; }
  .t-paper .cell.hi { background: #e0e7ff; color:#4338ca; }
  .t-paper .cell.br { box-shadow: inset 0 -2px 0 #d8d3c8; }
  .t-paper .cell.rb { box-shadow: inset -2px 0 0 #d8d3c8; }
  .t-paper .chip { background: #fff; color:#4f46e5; border:1px solid #c7d2fe; border-radius: 4px; }
  .t-paper .label h3 { color: #1f2937; font-family: Georgia, serif; }
  .t-paper .label span { color: #6b7280; font-family: Georgia, serif; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>Sudoku Arena — Theme Preview</h1>
    <p>Click any theme to select it · each board is styled live in that theme</p>
  </div>
  <div class="grid" id="grid"></div>
  <div class="picker">
    <div id="chosen" class="chosen none">No theme selected yet — click one above</div>
  </div>
</div>

<script>
const themes = [
  { id:'aurora', name:'Aurora Glass', cls:'t-aurora', desc:'Frosted glass · purple/teal aurora · premium iOS feel' },
  { id:'galaxy', name:'Midnight Galaxy', cls:'t-galaxy', desc:'Starfield · glowing nebula · cinematic & immersive' },
  { id:'brut',   name:'Neo-Brutalist',  cls:'t-brut',   desc:'Bold borders · hard shadows · punchy & playful' },
  { id:'zen',    name:'Zen Nature',      cls:'t-zen',    desc:'Sage & sand · organic · calm & meditative' },
  { id:'sunset', name:'Sunset Gradient', cls:'t-sunset', desc:'Coral→orange→gold · soft glow · energetic' },
  { id:'paper',  name:'Paper Origami',   cls:'t-paper',  desc:'Layered paper cards · indigo accent · refined minimal' },
];

// sample row content: 9 values, some 'given', one 'hi'(highlight), a few empty
const sample = [
  ['5','3','','6','','','' ,'9','8'],
  ['','7','','' ,'','5','','',''],
  ['','' ,'','2','' ,'','' ,'4',''],
  ['4','','8','','','' ,'','' ,''],
  ['' ,'','' ,'','9','','','' ,''],
  ['' ,'','' ,'','' ,'','3','',''],
  ['' ,'2','','','' ,'8','','',''],
  ['','' ,'','4','','','' ,'7',''],
  ['9','8','','' ,'','7','','',''],
];
// which cell gets the highlight accent (r,c)
const hi = { r:0, c:1 };

function renderBoard(cls) {
  let html = `<div class="board ${cls}-board">`;
  sample.forEach((row, r) => {
    row.forEach((v, c) => {
      const classes = ['cell'];
      if (v) classes.push('given');
      if (hi.r===r && hi.c===c) classes.push('hi');
      // box borders for nice 3x3 separation
      if ((c+1)%3===0 && c!==8) classes.push('rb');
      if ((r+1)%3===0 && r!==8) classes.push('br');
      html += `<div class="${classes.join(' ')}">${v}</div>`;
    });
  });
  html += `</div>`;
  return html;
}

function chips(cls) {
  return `
    <div class="hud">
      <span class="chip">⏱ 04:32</span>
      <span class="chip">★ 1,240</span>
      <span class="chip">💡 Hints 8</span>
      <span class="chip">🔥 Medium</span>
    </div>`;
}

const grid = document.getElementById('grid');
themes.forEach(t => {
  const card = document.createElement('div');
  card.className = `theme-card ${t.cls}`;
  card.dataset.id = t.id;
  card.innerHTML = `
    <span class="badge">SELECTED ✓</span>
    <div class="stage ${t.cls}">
      <div class="panel">
        ${renderBoard(t.cls)}
      </div>
      ${chips(t.cls)}
      <div class="label">
        <h3>${t.name}</h3>
        <span>${t.desc}</span>
      </div>
    </div>
  `;
  card.addEventListener('click', () => {
    document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    const chosen = document.getElementById('chosen');
    chosen.textContent = `Selected: ${t.name}`;
    chosen.classList.remove('none');
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
